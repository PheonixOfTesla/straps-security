<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0c10">
  <title>Dashboard - STRAPS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e8b84b'><path d='M12 2L4 6v6c0 5.5 3.5 10.7 8 12 4.5-1.3 8-6.5 8-12V6l-8-4z'/></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">STRAPS</div>
      <div class="live-badge"><div class="pulse"></div>LIVE OPS</div>
    </div>
    <div class="topbar-right">
      <button class="admin-btn" onclick="showModal('guards-modal')">+ Guard</button>
      <button class="admin-btn" onclick="showModal('locations-modal')">+ Location</button>
      <span id="clock"></span>
      <div class="avatar" id="user-avatar">C</div>
      <span id="user-name">Admin</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Guards Modal -->
  <div class="modal" id="guards-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Manage Guards</h3>
        <button class="close-btn" onclick="hideModal('guards-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="guards-list"></div>
        <div class="form-divider">Add New Guard</div>
        <input type="text" id="guard-name" placeholder="Full Name" class="modal-input">
        <input type="text" id="guard-username" placeholder="Username" class="modal-input">
        <input type="password" id="guard-password" placeholder="Password" class="modal-input">
        <select id="guard-type" class="modal-input">
          <option value="security">Security</option>
          <option value="patrol">Patrol</option>
          <option value="supervisor">Supervisor</option>
          <option value="armed">Armed</option>
          <option value="unarmed">Unarmed</option>
        </select>
        <input type="color" id="guard-color" value="#3b82f6" class="modal-color">
        <button class="modal-btn" onclick="addGuard()">Add Guard</button>
      </div>
    </div>
  </div>

  <!-- Locations Modal -->
  <div class="modal" id="locations-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Manage Locations</h3>
        <button class="close-btn" onclick="hideModal('locations-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="locations-list"></div>
        <div class="form-divider">Add New Location</div>
        <input type="text" id="loc-name" placeholder="Location Name" class="modal-input">
        <input type="text" id="loc-address" placeholder="Address" class="modal-input">
        <div class="latlong-row">
          <input type="number" step="any" id="loc-lat" placeholder="Latitude" class="modal-input">
          <input type="number" step="any" id="loc-lng" placeholder="Longitude" class="modal-input">
        </div>
        <button class="modal-btn secondary" onclick="getCurrentLocation()">Use Current Location</button>
        <button class="modal-btn" onclick="addLocation()">Add Location</button>
      </div>
    </div>
  </div>

  <div class="dash-body">
    <!-- Stats -->
    <div class="stat-card">
      <div class="stat-label">On Duty</div>
      <div class="stat-val green" id="stat-active">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">On Break</div>
      <div class="stat-val amber" id="stat-break">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Locations Covered</div>
      <div class="stat-val blue" id="stat-locations">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hours Logged Today</div>
      <div class="stat-val" id="stat-hours">0</div>
    </div>

    <!-- Map -->
    <div class="section map-section">
      <div class="section-header">
        <span class="section-title">LIVE LOCATIONS</span>
        <span class="section-sub">Updates every 30s</span>
      </div>
      <div id="map"></div>
    </div>

    <!-- Roster -->
    <div class="section roster-section">
      <div class="section-header">
        <span class="section-title">GUARD ROSTER</span>
      </div>
      <div id="roster"></div>
    </div>

    <!-- Activity Log -->
    <div class="section log-section">
      <div class="section-header">
        <span class="section-title">ACTIVITY LOG</span>
      </div>
      <div id="activity-log"></div>
    </div>

    <!-- Notes -->
    <div class="section notes-section">
      <div class="section-header">
        <span class="section-title">SHIFT NOTES</span>
      </div>
      <div class="notes-body">
        <div id="notes-list"></div>
        <textarea class="note-input" id="note-input" rows="2" placeholder="Add a shift note..."></textarea>
        <button class="add-note-btn" onclick="addNote()">+ Add Note</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script>
    // Auth check
    if (!requireAuth() || !requireAdmin()) {
      // Redirected
    }

    const user = getUser();
    document.getElementById('user-name').textContent = user?.name || 'Admin';
    document.getElementById('user-avatar').textContent = user?.initials?.[0] || 'A';

    // Clock
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Map setup
    const map = L.map('map').setView([25.76, -80.19], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const guardMarkers = {};
    const locationMarkers = {};

    // Load data
    async function loadDashboard() {
      try {
        // Stats
        const statsRes = await api('/dashboard/stats');
        const stats = await statsRes.json();
        document.getElementById('stat-active').textContent = stats.onDuty;
        document.getElementById('stat-break').textContent = stats.onBreak;
        document.getElementById('stat-locations').textContent = stats.locationsCovered;
        document.getElementById('stat-hours').textContent = stats.hoursLogged;

        // Map data
        const mapRes = await api('/dashboard/map');
        const mapData = await mapRes.json();
        updateMap(mapData.guards, mapData.locations);
        updateRoster(mapData.guards);

        // Activity
        const actRes = await api('/dashboard/activity/today');
        const actData = await actRes.json();
        updateActivityLog(actData.activities);

        // Notes
        const notesRes = await api('/notes/today');
        const notesData = await notesRes.json();
        updateNotes(notesData.notes);

      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    }

    function updateMap(guards, locations) {
      // Clear old markers
      Object.values(guardMarkers).forEach(m => map.removeLayer(m));
      Object.values(locationMarkers).forEach(m => map.removeLayer(m));

      // Add location markers
      const allBounds = [];
      (locations || []).forEach(loc => {
        if (loc.lat && loc.lng) {
          const icon = L.divIcon({
            className: 'location-marker',
            html: `<div style="width:24px;height:24px;background:#e8b84b;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 6px rgba(0,0,0,0.3)">📍</div>`,
            iconSize: [24, 24],
            iconAnchor: [12, 12]
          });

          const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
          marker.bindPopup(`
            <div style="font-family:Inter,sans-serif;font-size:12px">
              <strong>${loc.name}</strong><br>
              ${loc.address || 'No address'}
            </div>
          `);
          locationMarkers[loc.id] = marker;
          allBounds.push([loc.lat, loc.lng]);
        }
      });

      // Add guard markers
      guards.forEach(guard => {
        if (guard.lat && guard.lng) {
          const icon = L.divIcon({
            className: 'guard-marker ' + guard.status,
            html: `<div style="width:28px;height:28px;background:${guard.color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">${guard.initials[0]}</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          });

          const marker = L.marker([guard.lat, guard.lng], { icon }).addTo(map);
          marker.bindPopup(`
            <div style="font-family:Inter,sans-serif;font-size:12px">
              <strong>${guard.name}</strong><br>
              ${guard.location_name || 'Unknown'} ${guard.zone ? '· ' + guard.zone : ''}<br>
              <span style="color:${guard.status === 'active' ? '#22c55e' : '#e8b84b'}">${guard.status === 'active' ? 'On Duty' : 'On Break'}</span>
            </div>
          `);
          guardMarkers[guard.id] = marker;
          allBounds.push([guard.lat, guard.lng]);
        }
      });

      // Fit bounds to show all markers
      if (allBounds.length > 0) {
        map.fitBounds(allBounds, { padding: [50, 50], maxZoom: 14 });
      }
    }

    function updateRoster(guards) {
      const roster = document.getElementById('roster');
      roster.innerHTML = guards.map(g => `
        <div class="guard-row">
          <div class="g-avatar" style="background:${g.color}22;color:${g.color}">${g.initials}</div>
          <div class="g-info">
            <div class="g-name">${g.name}</div>
            <div class="g-loc">${g.location_name || 'No location'} ${g.zone ? '· ' + g.zone : ''}</div>
          </div>
          <div class="g-right">
            <div class="status-pill ${g.status === 'active' ? 's-active' : g.status === 'break' ? 's-break' : 's-offline'}">
              ${g.status === 'active' ? 'On Duty' : g.status === 'break' ? 'On Break' : 'Offline'}
            </div>
          </div>
        </div>
      `).join('');
    }

    function updateActivityLog(activities) {
      const log = document.getElementById('activity-log');
      log.innerHTML = activities.slice(0, 15).map(a => {
        const time = new Date(a.timestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        const color = a.action === 'checkin' ? '#22c55e' : a.action === 'checkout' ? '#ef4444' : a.action.includes('break') ? '#e8b84b' : '#6b7280';
        return `
          <div class="log-row">
            <span class="log-time">${time}</span>
            <div class="log-dot" style="background:${color}"></div>
            <span class="log-text">${a.details || a.action}</span>
          </div>
        `;
      }).join('');
    }

    function updateNotes(notes) {
      const list = document.getElementById('notes-list');
      list.innerHTML = notes.slice(0, 10).map(n => {
        const time = new Date(n.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        return `
          <div class="note-card">
            <div class="note-meta">${n.guard_name} · ${time}</div>
            <div class="note-text">${n.content}</div>
          </div>
        `;
      }).join('');
    }

    async function addNote() {
      const input = document.getElementById('note-input');
      const content = input.value.trim();
      if (!content) return;

      try {
        await api('/notes', {
          method: 'POST',
          body: JSON.stringify({ content, note_type: 'general' })
        });
        input.value = '';
        loadDashboard();
      } catch (err) {
        console.error('Failed to add note:', err);
      }
    }

    // Initial load
    loadDashboard();

    // Refresh every 30 seconds
    setInterval(loadDashboard, 30000);

    // Modal functions
    function showModal(id) {
      document.getElementById(id).classList.add('active');
      if (id === 'guards-modal') loadGuardsList();
      if (id === 'locations-modal') loadLocationsList();
    }

    function hideModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    async function loadGuardsList() {
      try {
        const res = await api('/auth/users');
        const data = await res.json();
        const guards = data.users.filter(u => u.role === 'guard');
        document.getElementById('guards-list').innerHTML = guards.map(g => `
          <div class="list-item">
            <div class="list-avatar" style="background:${g.color}">${g.initials}</div>
            <div class="list-info">
              <div class="list-name">${g.name}</div>
              <div class="list-sub">${g.username} · ${g.guard_type || 'security'}</div>
            </div>
            <button class="delete-btn" onclick="deleteGuard(${g.id})">&times;</button>
          </div>
        `).join('') || '<div class="empty-text">No guards yet</div>';
      } catch (err) {
        console.error('Failed to load guards:', err);
      }
    }

    async function loadLocationsList() {
      try {
        const res = await api('/locations');
        const data = await res.json();
        document.getElementById('locations-list').innerHTML = data.locations.map(l => `
          <div class="list-item">
            <div class="list-icon">📍</div>
            <div class="list-info">
              <div class="list-name">${l.name}</div>
              <div class="list-sub">${l.address || 'No address'}</div>
            </div>
            <button class="delete-btn" onclick="deleteLocation(${l.id})">&times;</button>
          </div>
        `).join('') || '<div class="empty-text">No locations yet</div>';
      } catch (err) {
        console.error('Failed to load locations:', err);
      }
    }

    async function addGuard() {
      const name = document.getElementById('guard-name').value.trim();
      const username = document.getElementById('guard-username').value.trim();
      const password = document.getElementById('guard-password').value;
      const guard_type = document.getElementById('guard-type').value;
      const color = document.getElementById('guard-color').value;

      if (!name || !username || !password) {
        alert('Please fill all fields');
        return;
      }

      try {
        const res = await api('/auth/users', {
          method: 'POST',
          body: JSON.stringify({ name, username, password, guard_type, color })
        });
        if (res.ok) {
          document.getElementById('guard-name').value = '';
          document.getElementById('guard-username').value = '';
          document.getElementById('guard-password').value = '';
          loadGuardsList();
          loadDashboard();
        } else {
          const err = await res.json();
          alert(err.error || 'Failed to add guard');
        }
      } catch (err) {
        alert('Failed to add guard');
      }
    }

    async function deleteGuard(id) {
      if (!confirm('Delete this guard?')) return;
      try {
        await api('/auth/users/' + id, { method: 'DELETE' });
        loadGuardsList();
        loadDashboard();
      } catch (err) {
        alert('Failed to delete guard');
      }
    }

    async function geocodeAddress(address) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
        const data = await res.json();
        if (data && data.length > 0) {
          return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        }
      } catch (err) {
        console.error('Geocoding failed:', err);
      }
      return null;
    }

    async function addLocation() {
      const name = document.getElementById('loc-name').value.trim();
      const address = document.getElementById('loc-address').value.trim();
      let lat = parseFloat(document.getElementById('loc-lat').value) || null;
      let lng = parseFloat(document.getElementById('loc-lng').value) || null;

      if (!name) {
        alert('Please enter a location name');
        return;
      }

      // Auto-geocode if address provided but no coordinates
      if (address && (!lat || !lng)) {
        const coords = await geocodeAddress(address);
        if (coords) {
          lat = coords.lat;
          lng = coords.lng;
        }
      }

      try {
        const res = await api('/locations', {
          method: 'POST',
          body: JSON.stringify({ name, address, lat, lng })
        });
        if (res.ok) {
          document.getElementById('loc-name').value = '';
          document.getElementById('loc-address').value = '';
          document.getElementById('loc-lat').value = '';
          document.getElementById('loc-lng').value = '';
          loadLocationsList();
          loadDashboard();
        } else {
          const err = await res.json();
          alert(err.error || 'Failed to add location');
        }
      } catch (err) {
        alert('Failed to add location');
      }
    }

    async function deleteLocation(id) {
      if (!confirm('Delete this location?')) return;
      try {
        await api('/locations/' + id, { method: 'DELETE' });
        loadLocationsList();
        loadDashboard();
      } catch (err) {
        alert('Failed to delete location');
      }
    }

    function getCurrentLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          document.getElementById('loc-lat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('loc-lng').value = pos.coords.longitude.toFixed(6);
        }, err => {
          alert('Could not get location');
        });
      }
    }

    // Close modal on outside click
    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', e => {
        if (e.target === modal) hideModal(modal.id);
      });
    });
  </script>
</body>
</html>
