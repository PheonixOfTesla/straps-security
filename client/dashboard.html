<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0c10">
  <title>Dashboard - STRAPS</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e8b84b'><path d='M12 2L4 6v6c0 5.5 3.5 10.7 8 12 4.5-1.3 8-6.5 8-12V6l-8-4z'/></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">STRAPS</div>
      <div class="live-badge"><div class="pulse"></div>LIVE OPS</div>
    </div>
    <div class="topbar-right">
      <span id="clock"></span>
      <div class="avatar" id="user-avatar">C</div>
      <span id="user-name">Admin</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="dash-body">
    <!-- Stats -->
    <div class="stat-card">
      <div class="stat-label">On Duty</div>
      <div class="stat-val green" id="stat-active">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">On Break</div>
      <div class="stat-val amber" id="stat-break">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Locations Covered</div>
      <div class="stat-val blue" id="stat-locations">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hours Logged Today</div>
      <div class="stat-val" id="stat-hours">0</div>
    </div>

    <!-- Map -->
    <div class="section map-section">
      <div class="section-header">
        <span class="section-title">LIVE LOCATIONS</span>
        <span class="section-sub">Updates every 30s</span>
      </div>
      <div id="map"></div>
    </div>

    <!-- Roster -->
    <div class="section roster-section">
      <div class="section-header">
        <span class="section-title">GUARD ROSTER</span>
      </div>
      <div id="roster"></div>
    </div>

    <!-- Activity Log -->
    <div class="section log-section">
      <div class="section-header">
        <span class="section-title">ACTIVITY LOG</span>
      </div>
      <div id="activity-log"></div>
    </div>

    <!-- Notes -->
    <div class="section notes-section">
      <div class="section-header">
        <span class="section-title">SHIFT NOTES</span>
      </div>
      <div class="notes-body">
        <div id="notes-list"></div>
        <textarea class="note-input" id="note-input" rows="2" placeholder="Add a shift note..."></textarea>
        <button class="add-note-btn" onclick="addNote()">+ Add Note</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/api.js"></script>
  <script>
    // Auth check
    if (!requireAuth() || !requireAdmin()) {
      // Redirected
    }

    const user = getUser();
    document.getElementById('user-name').textContent = user?.name || 'Admin';
    document.getElementById('user-avatar').textContent = user?.initials?.[0] || 'A';

    // Clock
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Map setup
    const map = L.map('map').setView([25.76, -80.19], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const guardMarkers = {};

    // Load data
    async function loadDashboard() {
      try {
        // Stats
        const statsRes = await api('/dashboard/stats');
        const stats = await statsRes.json();
        document.getElementById('stat-active').textContent = stats.onDuty;
        document.getElementById('stat-break').textContent = stats.onBreak;
        document.getElementById('stat-locations').textContent = stats.locationsCovered;
        document.getElementById('stat-hours').textContent = stats.hoursLogged;

        // Map data
        const mapRes = await api('/dashboard/map');
        const mapData = await mapRes.json();
        updateMap(mapData.guards);
        updateRoster(mapData.guards);

        // Activity
        const actRes = await api('/dashboard/activity/today');
        const actData = await actRes.json();
        updateActivityLog(actData.activities);

        // Notes
        const notesRes = await api('/notes/today');
        const notesData = await notesRes.json();
        updateNotes(notesData.notes);

      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    }

    function updateMap(guards) {
      // Clear old markers
      Object.values(guardMarkers).forEach(m => map.removeLayer(m));

      guards.forEach(guard => {
        if (guard.lat && guard.lng) {
          const icon = L.divIcon({
            className: 'guard-marker ' + guard.status,
            html: `<div style="width:28px;height:28px;background:${guard.color};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">${guard.initials[0]}</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          });

          const marker = L.marker([guard.lat, guard.lng], { icon }).addTo(map);
          marker.bindPopup(`
            <div style="font-family:Inter,sans-serif;font-size:12px">
              <strong>${guard.name}</strong><br>
              ${guard.location_name || 'Unknown'} ${guard.zone ? '· ' + guard.zone : ''}<br>
              <span style="color:${guard.status === 'active' ? '#22c55e' : '#e8b84b'}">${guard.status === 'active' ? 'On Duty' : 'On Break'}</span>
            </div>
          `);
          guardMarkers[guard.id] = marker;
        }
      });

      // Fit bounds if guards exist
      if (guards.length > 0) {
        const bounds = guards.filter(g => g.lat && g.lng).map(g => [g.lat, g.lng]);
        if (bounds.length > 0) {
          map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
        }
      }
    }

    function updateRoster(guards) {
      const roster = document.getElementById('roster');
      roster.innerHTML = guards.map(g => `
        <div class="guard-row">
          <div class="g-avatar" style="background:${g.color}22;color:${g.color}">${g.initials}</div>
          <div class="g-info">
            <div class="g-name">${g.name}</div>
            <div class="g-loc">${g.location_name || 'No location'} ${g.zone ? '· ' + g.zone : ''}</div>
          </div>
          <div class="g-right">
            <div class="status-pill ${g.status === 'active' ? 's-active' : g.status === 'break' ? 's-break' : 's-offline'}">
              ${g.status === 'active' ? 'On Duty' : g.status === 'break' ? 'On Break' : 'Offline'}
            </div>
          </div>
        </div>
      `).join('');
    }

    function updateActivityLog(activities) {
      const log = document.getElementById('activity-log');
      log.innerHTML = activities.slice(0, 15).map(a => {
        const time = new Date(a.timestamp).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        const color = a.action === 'checkin' ? '#22c55e' : a.action === 'checkout' ? '#ef4444' : a.action.includes('break') ? '#e8b84b' : '#6b7280';
        return `
          <div class="log-row">
            <span class="log-time">${time}</span>
            <div class="log-dot" style="background:${color}"></div>
            <span class="log-text">${a.details || a.action}</span>
          </div>
        `;
      }).join('');
    }

    function updateNotes(notes) {
      const list = document.getElementById('notes-list');
      list.innerHTML = notes.slice(0, 10).map(n => {
        const time = new Date(n.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        return `
          <div class="note-card">
            <div class="note-meta">${n.guard_name} · ${time}</div>
            <div class="note-text">${n.content}</div>
          </div>
        `;
      }).join('');
    }

    async function addNote() {
      const input = document.getElementById('note-input');
      const content = input.value.trim();
      if (!content) return;

      try {
        await api('/notes', {
          method: 'POST',
          body: JSON.stringify({ content, note_type: 'general' })
        });
        input.value = '';
        loadDashboard();
      } catch (err) {
        console.error('Failed to add note:', err);
      }
    }

    // Initial load
    loadDashboard();

    // Refresh every 30 seconds
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
