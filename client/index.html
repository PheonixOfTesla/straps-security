<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0c10">
  <title>STRAPS - Security Operations</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23e8b84b'><path d='M12 2L4 6v6c0 5.5 3.5 10.7 8 12 4.5-1.3 8-6.5 8-12V6l-8-4z'/></svg>">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="grid-bg"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-shield">
          <svg viewBox="0 0 24 24"><path d="M12 2L4 6v6c0 5.5 3.5 10.7 8 12 4.5-1.3 8-6.5 8-12V6l-8-4z"/></svg>
        </div>
        <div>
          <div class="logo-text">STRAPS</div>
          <div class="logo-sub">Security Operations</div>
        </div>
      </div>

      <h2>Command Center</h2>
      <p class="sub">Sign in to access live field operations</p>

      <div class="hint" style="cursor:pointer" onclick="document.getElementById('username').value='charles';document.getElementById('password').value='straps2024';">Demo: <strong>charles</strong> / <strong>straps2024</strong> (click to fill)</div>

      <form id="login-form" novalidate>
        <div class="field">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" autocomplete="off">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="text" id="password" placeholder="Enter password" autocomplete="off" style="-webkit-text-security: disc;">
        </div>
        <div class="err" id="error-msg"></div>
        <button type="submit" class="btn" id="login-btn">ACCESS COMMAND CENTER</button>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) {
      const user = getUser();
      window.location.href = user?.role === 'admin' ? '/dashboard' : '/guard';
    }

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'SIGNING IN...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const user = await login(username, password);
        window.location.href = user.role === 'admin' ? '/dashboard' : '/guard';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'ACCESS COMMAND CENTER';
      }
    });
  </script>
</body>
</html>
